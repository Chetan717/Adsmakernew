<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Image Editor</title>
  <style>
    body { margin: 0; }
    #cesdk-container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="cesdk-container"></div>

  <script src="https://cdn.img.ly/packages/imgly/cesdk-js/1.70.0/cesdk.umd.js"></script>
  
  <script>
    const config = {
      // Replace with your actual license key
      license: 'YOUR_LICENSE_KEY_HERE', 
      baseURL: 'https://cdn.img.ly/packages/imgly/cesdk-js/1.70.0/assets',
      ui: {
        elements: {
          navigation: {
            action: {
              export: true // Enables the save/download button
            }
          }
        }
      },
      callbacks: {
        onExport: (blobs) => {
          // Logic to handle the exported image (e.g., download it)
          const url = URL.createObjectURL(blobs[0]);
          const link = document.createElement('a');
          link.href = url;
          link.download = 'edited-image.png';
          link.click();
        }
      }
    };

    // Initialize the Editor
    CreativeEditorSDK.init(
      document.getElementById('cesdk-container'),
      config
    ).then((instance) => {
      // Optional: Load a default image to start with
      instance.engine.scene.createFromImage('https://images.unsplash.com/photo-1579546929518-9e396f3cc809');
    });
  </script>
</body>
</html>
